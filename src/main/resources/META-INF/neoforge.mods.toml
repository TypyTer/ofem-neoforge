modLoader = "javafml"
loaderVersion = "${loader_version_range}"
license = "${mod_license}"

[[mods]]
    modId = "${mod_id}"
    version = "${mod_version}"
    displayName = "${mod_name}"
    description = """${mod_description}"""

    [[mods.dependencies.ofem]]
        modId = "neoforge"
        type = "required"
        versionRange = "${neo_version_range}"
        ordering = "NONE"
        side = "SERVER"

    [[mods.dependencies.ofem]]
        modId = "minecraft"
        type = "required"
        versionRange = "${minecraft_version_range}"
        ordering = "NONE"
        side = "SERVER"

[[mixins]]
    config = "ofem.mixins.json"
